name: Unit tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: phpunit-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  php-version:
    runs-on: ubuntu-latest
    outputs:
      min: ${{ steps.php.outputs.min }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Read PHP min version from composer.json
        id: php
        run: |
          min=$(jq -r '.require.php' composer.json | grep -oP '\d+\.\d+' | head -1)
          echo "min=$min" >> $GITHUB_OUTPUT

  phpunit:
    runs-on: ubuntu-latest
    needs: php-version

    name: phpunit PHP ${{ needs.php-version.outputs.min }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up PHP ${{ needs.php-version.outputs.min }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.php-version.outputs.min }}
          tools: composer:v2
          coverage: xdebug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests with coverage
        env:
          XDEBUG_MODE: coverage
        run: composer run test:coverage

      - name: Upload coverage to Coveralls
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vendor/bin/php-coveralls --coverage_clover=build/logs/clover.xml --json_path=build/logs/coveralls-upload.json -v

  summary:
    runs-on: ubuntu-latest
    needs: phpunit
    if: always()
    name: phpunit-summary
    steps:
      - name: Summary status
        run: if ${{ needs.phpunit.result != 'success' && needs.phpunit.result != 'skipped' }}; then exit 1; fi
