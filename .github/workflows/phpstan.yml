name: PHPStan

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: phpstan-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  php-version:
    runs-on: ubuntu-latest
    outputs:
      min: ${{ steps.php.outputs.min }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Read PHP min version from composer.json
        id: php
        run: |
          min=$(jq -r '.require.php' composer.json | grep -oP '\d+\.\d+' | head -1)
          echo "min=$min" >> $GITHUB_OUTPUT

  phpstan:
    runs-on: ubuntu-latest
    needs: php-version
    name: phpstan
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up PHP ${{ needs.php-version.outputs.min }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.php-version.outputs.min }}
          tools: composer:v2
          coverage: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer run phpstan

  summary:
    runs-on: ubuntu-latest
    needs: phpstan
    if: always()
    name: phpstan-summary
    steps:
      - name: Summary status
        run: if ${{ needs.phpstan.result != 'success' && needs.phpstan.result != 'skipped' }}; then exit 1; fi
